# Trajectory — local development.
# `docker compose up` brings up the dev server with hot reload.
# Source is bind-mounted; node_modules lives in a named volume to avoid
# host/container OS mismatches and to keep host directory clean.
# Persistent state (SQLite, uploads) lives in ./data on the host so it
# survives container rebuilds.

services:
  trajectory:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: trajectory
    image: trajectory:dev
    ports:
      - '5173:5173'
    environment:
      NODE_ENV: development
      TRAJECTORY_DATA_DIR: /app/data
      TRAJECTORY_DB_FILE: /app/data/db.sqlite
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5173}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@trajectory.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-on-first-login}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-insecure-secret-please-set-BETTER_AUTH_SECRET-in-prod}
      # SMTP unset in dev → mailer logs "would-send" to stdout instead of sending.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Trajectory <noreply@trajectory.local>}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    volumes:
      # Source tree — edits on host trigger HMR in container.
      - ./src:/app/src
      - ./static:/app/static
      - ./drizzle:/app/drizzle
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      - ./svelte.config.js:/app/svelte.config.js
      - ./vite.config.ts:/app/vite.config.ts
      - ./drizzle.config.ts:/app/drizzle.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./package.json:/app/package.json
      - ./eslint.config.js:/app/eslint.config.js
      - ./.prettierrc:/app/.prettierrc
      - ./.prettierignore:/app/.prettierignore
      # `.gitignore` is loaded by eslint.config.js (via @eslint/compat's
      # `includeIgnoreFile`) so `pnpm lint` in the container can mirror CI.
      - ./.gitignore:/app/.gitignore
      # Persistent state — survives `docker compose down`.
      - ./data:/app/data
      # Anonymous volume for node_modules so host doesn't shadow container.
      - trajectory_node_modules:/app/node_modules
      # Anonymous volume for SvelteKit's generated files.
      - trajectory_svelte_kit:/app/.svelte-kit
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  trajectory_node_modules:
  trajectory_svelte_kit:
