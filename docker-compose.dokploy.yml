# Trajectory — example production compose for Dokploy.
#
# Differs from the dev compose in three ways that all matter:
#  1. Builds the `prod` Dockerfile target (node build, no Vite HMR).
#  2. Persists data/ in a named Docker volume (Dokploy + named volumes
#     handle ownership cleanly; bind-mounts collide with the prod
#     image's `node` user UID 1000 vs the host's root-owned path).
#  3. No source bind-mounts — the image is the deployable.
#
# Dokploy's reverse proxy (Traefik) routes the configured domain to
# this service's port 5173. The service is named `app` to match
# Dokploy's default `serviceName=app` domain config; rename if your
# Dokploy project is configured differently.
#
# Required env (set in Dokploy's Environment panel for the compose):
#   PUBLIC_BASE_URL=https://your-trajectory-domain
#   BETTER_AUTH_SECRET=<random 32+ char string>
#
#   # First-admin seed (consumed only on first boot of a fresh DB):
#   ADMIN_EMAIL=<admin email>
#   ADMIN_PASSWORD=<initial password — change from /profile after login>
#
#   # SMTP — required in production for invites + password reset:
#   SMTP_HOST=...
#   SMTP_PORT=587
#   SMTP_USER=...
#   SMTP_PASS=...
#   SMTP_FROM="Trajectory <noreply@your-domain>"
#   SMTP_SECURE=false   # true for port 465

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    image: trajectory:prod
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5173
      TRAJECTORY_DATA_DIR: /app/data
      TRAJECTORY_DB_FILE: /app/data/db.sqlite
      # adapter-node defaults to 512K, smaller than typical phone photos.
      # The in-handler caps (4MB avatar, 12MB equipment) are the real
      # limits; this just keeps the framework from rejecting first.
      BODY_SIZE_LIMIT: 16M
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    volumes:
      - trajectory_data:/app/data
    restart: unless-stopped

volumes:
  trajectory_data:
