name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck + build + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Boot dev container
        run: |
          mkdir -p data
          # Container runs as `node` (UID 1000); the runner is UID 1001,
          # so without this chown the bind-mounted data/ is read-only to
          # better-sqlite3 → SQLITE_READONLY_DIRECTORY on WAL setup.
          sudo chown -R 1000:1000 data
          docker compose up -d
          # Wait up to 90s for the dev server to come online.
          for i in $(seq 1 45); do
            if curl -sSf http://localhost:5173 >/dev/null 2>&1; then
              echo "Dev server ready after ${i} attempts."
              exit 0
            fi
            sleep 2
          done
          echo "Dev server did not come online within 90s." >&2
          docker compose logs --tail=200
          exit 1

      - name: Smoke test
        env:
          ADMIN_EMAIL: admin@trajectory.local
          ADMIN_PASSWORD: change-me-on-first-login
          TRAJECTORY_URL: http://localhost:5173
        run: pnpm test:smoke

      - name: Container logs (on failure)
        if: failure()
        run: docker compose logs --tail=500

      - name: Tear down
        if: always()
        run: docker compose down -v
